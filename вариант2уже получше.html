<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>День Рождения - Уровень 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c2c2c;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #gameCanvas { display: block; }
        .dialogue {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            border: 4px solid #ffb6c1;
            border-radius: 8px;
            padding: 15px 25px;
            text-align: center;
            font-size: 16px;
            color: #5a4a5a;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .dialogue.show { display: block; animation: popIn 0.3s ease; }
        .fullscreen-message {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,182,193,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            z-index: 200;
        }
        .fullscreen-message.show { display: flex; animation: fadeIn 0.5s ease; }
        .fullscreen-message p { font-size: 28px; color: #5a4a5a; line-height: 1.6; }
        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .heart {
            position: absolute;
            font-size: 32px;
            animation: floatUp 1.5s ease forwards;
            pointer-events: none;
            z-index: 150;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        .seed {
            position: absolute;
            font-size: 28px;
            animation: giveSeed 1s ease forwards;
            pointer-events: none;
            z-index: 150;
        }
        @keyframes giveSeed {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(0, -40px); opacity: 0; }
        }
        .instructions {
            position: absolute;
            top: 10px; left: 10px;
            background: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #5a4a5a;
            border: 2px solid #ffb6c1;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="instructions">🎮 Стрелочки - движение<br>⏎ ENTER - взаимодействие</div>
        <div id="dialogue" class="dialogue"></div>
        <div id="fullscreenMessage" class="fullscreen-message">
            <p>💌 Новых сообщений нет<br><br><small>Но интернет работает!</small><br><br><small>Нажмите ESC чтобы закрыть</small></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const dialogueEl = document.getElementById('dialogue');
        const fullscreenMessageEl = document.getElementById('fullscreenMessage');

        const images = {
            alena: new Image(),
            cat: new Image(),
            chinchilla: new Image(),
            room: new Image()
        };

        images.alena.src = 'alena.png';
        images.cat.src = 'cat.png';
        images.chinchilla.src = 'chinchilla.png';
        images.room.src = 'room.png';

        let player = { x: 400, y: 420, width: 180, height: 200, speed: 4, direction: 'down' };
        let keys = {};
        let currentDialogue = null;
        let tasksCompleted = { cat: false, chinchilla: false, computer: false, door: false };
        let imagesLoaded = false;

        let loadedCount = 0;
        Object.values(images).forEach(img => {
            img.addEventListener('load', () => {
                loadedCount++;
                if (loadedCount >= 4) imagesLoaded = true;
            });
        });

        const zones = {
            cat: { x: 560, y: 320, width: 60, height: 50, name: 'Роксана' },
            chinchilla: { x: 80, y: 360, width: 50, height: 60, name: 'Шлёпокрыса' },
            computer: { x: 200, y: 320, width: 60, height: 40, name: 'Компьютер' },
            door: { x: 590, y: 350, width: 60, height: 40, name: 'Дверь' }
        };

        const positions = {
            cat: { x: 570, y: 300 },
            chinchilla: { x: 85, y: 300 }
        };

        function drawRoom() {
            if (images.room.complete && images.room.naturalWidth !== 0) {
                ctx.drawImage(images.room, 0, 0, 800, 600);
            } else {
                ctx.fillStyle = '#ffe4ec';
                ctx.fillRect(0, 0, 800, 600);
            }
        }

        function drawPlayer() {
            if (imagesLoaded && images.alena.complete && images.alena.naturalWidth !== 0) {
                ctx.drawImage(images.alena, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#ffb6c1';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
        }

        function drawCat() {
            if (imagesLoaded && images.cat.complete && images.cat.naturalWidth !== 0) {
                ctx.drawImage(images.cat, positions.cat.x, positions.cat.y, 50, 50);
            } else {
                ctx.fillStyle = '#ffa500';
                ctx.fillRect(positions.cat.x, positions.cat.y, 50, 50);
            }
        }

        function drawChinchilla() {
            if (imagesLoaded && images.chinchilla.complete && images.chinchilla.naturalWidth !== 0) {
                ctx.drawImage(images.chinchilla, positions.chinchilla.x, positions.chinchilla.y, 45, 45);
            } else {
                ctx.fillStyle = '#808080';
                ctx.fillRect(positions.chinchilla.x, positions.chinchilla.y, 45, 45);
            }
        }

        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function updateDialogue() {
            let nearZone = null;
            for (let zoneName in zones) {
                if (checkCollision(player, zones[zoneName])) {
                    nearZone = zoneName;
                    break;
                }
            }
            if (nearZone === 'door') {
                if (tasksCompleted.cat && tasksCompleted.chinchilla) {
                    dialogueEl.textContent = '🚪 Выйти из дома (ENTER)';
                } else {
                    dialogueEl.textContent = '🚪 Нужно сначала покормить всех животных!';
                }
                dialogueEl.classList.add('show');
                currentDialogue = nearZone;
            } else if (nearZone && !tasksCompleted[nearZone]) {
                if (nearZone === 'cat') dialogueEl.textContent = '🐱 Покормить Роксану (ENTER)';
                else if (nearZone === 'chinchilla') dialogueEl.textContent = '🐹 Покормить Шлёпокрысу (ENTER)';
                else if (nearZone === 'computer') dialogueEl.textContent = '💻 Проверить сообщения (ENTER)';
                dialogueEl.classList.add('show');
                currentDialogue = nearZone;
            } else {
                dialogueEl.classList.remove('show');
                currentDialogue = null;
            }
        }

        function animateCatFeed() {
            const container = document.getElementById('gameContainer');
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const food = document.createElement('div');
                    food.className = 'seed';
                    food.textContent = '🐟';
                    food.style.left = '590px';
                    food.style.top = '340px';
                    container.appendChild(food);
                    setTimeout(() => food.remove(), 1000);
                }, i * 200);
            }
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart';
                        heart.textContent = '❤️';
                        heart.style.left = (560 + Math.random() * 60) + 'px';
                        heart.style.top = '320px';
                        container.appendChild(heart);
                        setTimeout(() => heart.remove(), 1500);
                    }, i * 200);
                }
            }, 800);
            tasksCompleted.cat = true;
        }

        function animateChinchillaFeed() {
            const container = document.getElementById('gameContainer');
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const seed = document.createElement('div');
                    seed.className = 'seed';
                    seed.textContent = '🌻';
                    seed.style.left = '105px';
                    seed.style.top = '380px';
                    container.appendChild(seed);
                    setTimeout(() => seed.remove(), 1000);
                }, i * 200);
            }
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart';
                        heart.textContent = '💕';
                        heart.style.left = (80 + Math.random() * 50) + 'px';
                        heart.style.top = '350px';
                        container.appendChild(heart);
                        setTimeout(() => heart.remove(), 1500);
                    }, i * 200);
                }
            }, 800);
            tasksCompleted.chinchilla = true;
        }

        function checkComputer() {
            fullscreenMessageEl.classList.add('show');
            tasksCompleted.computer = true;
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'Enter') {
                if (currentDialogue === 'cat' && !tasksCompleted.cat) animateCatFeed();
                else if (currentDialogue === 'chinchilla' && !tasksCompleted.chinchilla) animateChinchillaFeed();
                else if (currentDialogue === 'computer' && !tasksCompleted.computer) checkComputer();
                else if (currentDialogue === 'door' && tasksCompleted.cat && tasksCompleted.chinchilla) {
                    alert('🎮 Переход на следующий уровень!');
                }
            }
            if (e.key === 'Escape') {
                if (fullscreenMessageEl.classList.contains('show')) fullscreenMessageEl.classList.remove('show');
            }
        });

        document.addEventListener('keyup', (e) => { keys[e.key] = false; });



        // Зоны, где можно ходить (пока пустые — ходим везде)
        const walkableZones = [
        //{ x: 40, y: 70, width: 720, height: 470 }  //ВОТ ТУТ ВОТ ПОДОБРАТЬ КООРДИНАТЫ
        ];

        function canWalk(x, y) {
            if (walkableZones.length === 0) return true;
            for (let zone of walkableZones) {
                if (x >= zone.x && x <= zone.x + zone.width &&
                    y >= zone.y && y <= zone.y + zone.height) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let newX = player.x;
            let newY = player.y;

            if (keys['ArrowUp'])    { newY -= player.speed; player.direction = 'up'; }
            if (keys['ArrowDown'])  { newY += player.speed; player.direction = 'down'; }
            if (keys['ArrowLeft'])  { newX -= player.speed; player.direction = 'left'; }
            if (keys['ArrowRight']) { newX += player.speed; player.direction = 'right'; }

            const leftFootX = newX + 20;
            const rightFootX = newX + player.width - 20;
            const footY = newY + player.height - 5;

            // Проверка: если зон нет — ходим везде, иначе проверяем
            if (canWalk(leftFootX, footY) && canWalk(rightFootX, footY)) {
                player.x = newX;
                player.y = newY;
            }

            drawRoom();

            // Отладка
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(450, 0, 350, 60);
            ctx.fillStyle = 'yellow';
            ctx.font = '13px monospace';
            ctx.fillText(`X:${player.x} Y:${player.y}`, 460, 16);
            ctx.fillText(`Стопы: [${Math.floor(leftFootX)},${Math.floor(footY)}]`, 460, 34);

            drawChinchilla();
            drawCat();
            drawPlayer();
            updateDialogue();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
