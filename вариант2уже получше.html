<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>День Рождения - Уровень 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c2c2c;
            font-family: 'Courier New', monospace;
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            display: block;
            image-rendering: pixelated;
        }

        .dialogue {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #ffb6c1;
            border-radius: 8px;
            padding: 15px 25px;
            text-align: center;
            font-size: 16px;
            color: #5a4a5a;
            display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .dialogue.show {
            display: block;
            animation: popIn 0.3s ease;
        }

        .fullscreen-message {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            z-index: 200;
        }

        .fullscreen-message.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        .fullscreen-message p {
            font-size: 28px;
            color: #5a4a5a;
            line-height: 1.6;
        }

        @keyframes popIn {
            0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .heart {
            position: absolute;
            font-size: 32px;
            animation: floatUp 1.5s ease forwards;
            pointer-events: none;
            z-index: 150;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }

        .seed {
            position: absolute;
            font-size: 28px;
            animation: giveSeed 1s ease forwards;
            pointer-events: none;
            z-index: 150;
        }

        @keyframes giveSeed {
            0% { transform: translate(0, 0); opacity: 1; }
            100% { transform: translate(0, -40px); opacity: 0; }
        }

        .instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            color: #5a4a5a;
            border: 2px solid #ffb6c1;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="instructions">
            🎮 Стрелочки - движение<br>
            ⏎ ENTER - взаимодействие
        </div>
        <div id="dialogue" class="dialogue"></div>
        <div id="fullscreenMessage" class="fullscreen-message">
            <p>🎉 Все животные покормлены, а значит все хорошо!<br><br>Теперь можно выйти из дома со спокойной душой.<br><br><small>Нажмите ENTER для продолжения</small></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const dialogueEl = document.getElementById('dialogue');
        const fullscreenMessageEl = document.getElementById('fullscreenMessage');

        // Загрузка изображений
        const images = {
            alena: new Image(),
            cat: new Image(),
            chinchilla: new Image()
        };

        // УКАЖИ ПУТИ К СВОИМ КАРТИНКАМ ЗДЕСЬ
        images.alena.src = 'alena.png';  // твоя картинка с Аленкой
        images.cat.src = 'cat.png';      // твоя картинка с кошкой
        images.chinchilla.src = 'chinchilla.png'; // твоя картинка с шиншиллой

        // Игровые переменные
        let player = { 
            x: 400, 
            y: 450, 
            width: 48, 
            height: 64, 
            speed: 4,
            direction: 'down'
        };
        
        let keys = {};
        let currentDialogue = null;
        let tasksCompleted = { cat: false, chinchilla: false };
        let imagesLoaded = false;

        // Проверка загрузки изображений
        let loadedCount = 0;
        Object.values(images).forEach(img => {
            img.onload = () => {
                loadedCount++;
                if (loadedCount === Object.keys(images).length) {
                    imagesLoaded = true;
                }
            };
        });

        // Зоны взаимодействия
        const zones = {
            cat: { x: 320, y: 340, width: 60, height: 50, name: 'Роксана' },
            chinchilla: { x: 80, y: 360, width: 50, height: 60, name: 'Шлёпокрыса' }
        };

        // Позиции персонажей
        const positions = {
            cat: { x: 330, y: 330 },
            chinchilla: { x: 85, y: 350 }
        };

        // Отрисовка пиксельной комнаты
        function drawRoom() {
            // Пол (деревянный)
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(0, 400, 800, 200);
            // Доски пола
            ctx.fillStyle = '#c49564';
            for (let i = 0; i < 800; i += 40) {
                ctx.fillRect(i, 400, 2, 200);
            }

            // Стены (пастельно-розовые)
            ctx.fillStyle = '#ffe4ec';
            ctx.fillRect(0, 0, 800, 400);

            // Плинтус
            ctx.fillStyle = '#ffb6c1';
            ctx.fillRect(0, 390, 800, 10);

            // Окно с занавесками
            ctx.fillStyle = '#e6d5f0';
            ctx.fillRect(300, 100, 200, 200);
            // Стекло
            ctx.fillStyle = '#b8e0f0';
            ctx.fillRect(320, 120, 160, 160);
            // Рама
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(418, 120, 4, 160);
            ctx.fillRect(320, 200, 160, 4);
            // Фиолетовые занавески
            ctx.fillStyle = '#dda0dd';
            ctx.fillRect(280, 100, 40, 200);
            ctx.fillRect(480, 100, 40, 200);

            // Люстра
            ctx.fillStyle = '#f0e6d0';
            ctx.fillRect(380, 20, 40, 10);
            ctx.fillStyle = '#ffe4b5';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(385 + i * 8, 30, 6, 20);
            }

            // Шкаф (деревянный)
            ctx.fillStyle = '#c9a87c';
            ctx.fillRect(600, 180, 180, 220);
            // Дверцы шкафа
            ctx.fillStyle = '#b8986c';
            ctx.fillRect(610, 190, 80, 200);
            ctx.fillRect(690, 190, 80, 200);
            // Ручки
            ctx.fillStyle = '#8b7355';
            ctx.fillRect(680, 290, 8, 8);
            ctx.fillRect(712, 290, 8, 8);

            // Кровать
            ctx.fillStyle = '#ffb6c1';
            ctx.fillRect(200, 320, 200, 80);
            // Подушки
            ctx.fillStyle = '#ffc0cb';
            ctx.fillRect(210, 310, 60, 40);
            ctx.fillRect(280, 310, 60, 40);
            // Одеяло
            ctx.fillStyle = '#ff9eb5';
            ctx.fillRect(200, 340, 200, 60);

            // Рабочий стол
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(50, 350, 120, 50);
            // Ножки стола
            ctx.fillStyle = '#b89564';
            ctx.fillRect(60, 400, 15, 40);
            ctx.fillRect(155, 400, 15, 40);
            // Компьютер
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(80, 320, 60, 40);
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(85, 325, 50, 30);

            // Клетка для шиншиллы
            ctx.fillStyle = '#8b8b8b';
            ctx.fillRect(60, 300, 70, 100);
            // Прутья клетки
            ctx.fillStyle = '#696969';
            for (let i = 0; i < 10; i++) {
                ctx.fillRect(65 + i * 6, 300, 2, 100);
            }
            for (let i = 0; i < 8; i++) {
                ctx.fillRect(60, 310 + i * 12, 70, 2);
            }
            // Дверца клетки
            ctx.fillStyle = '#a0a0a0';
            ctx.fillRect(90, 340, 30, 40);
        }

        // Отрисовка персонажа Аленки
        function drawPlayer() {
            if (imagesLoaded && images.alena.complete && images.alena.naturalWidth !== 0) {
                ctx.drawImage(images.alena, player.x, player.y, player.width, player.height);
            } else {
                // Запасной вариант - розовый квадрат
                ctx.fillStyle = '#ffb6c1';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
        }

        // Отрисовка кошки
        function drawCat() {
            if (imagesLoaded && images.cat.complete && images.cat.naturalWidth !== 0) {
                ctx.drawImage(images.cat, positions.cat.x, positions.cat.y, 50, 50);
            } else {
                // Запасной вариант - оранжевый квадрат
                ctx.fillStyle = '#ffa500';
                ctx.fillRect(positions.cat.x, positions.cat.y, 50, 50);
            }
        }

        // Отрисовка шиншиллы
        function drawChinchilla() {
            if (imagesLoaded && images.chinchilla.complete && images.chinchilla.naturalWidth !== 0) {
                ctx.drawImage(images.chinchilla, positions.chinchilla.x, positions.chinchilla.y, 45, 45);
            } else {
                // Запасной вариант - серый квадрат
                ctx.fillStyle = '#808080';
                ctx.fillRect(positions.chinchilla.x, positions.chinchilla.y, 45, 45);
            }
        }

        // Проверка столкновений
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Обновление диалога
        function updateDialogue() {
            let nearZone = null;
            
            for (let zoneName in zones) {
                if (checkCollision(player, zones[zoneName])) {
                    nearZone = zoneName;
                    break;
                }
            }

            if (nearZone && !tasksCompleted[nearZone]) {
                if (nearZone === 'cat') {
                    dialogueEl.textContent = '🐱 Покормить Роксану (ENTER)';
                } else if (nearZone === 'chinchilla') {
                    dialogueEl.textContent = '🐹 Покормить Шлёпокрысу (ENTER)';
                }
                dialogueEl.classList.add('show');
                currentDialogue = nearZone;
            } else {
                dialogueEl.classList.remove('show');
                currentDialogue = null;
            }
        }

        // Анимация кормления кошки
        function animateCatFeed() {
            const container = document.getElementById('gameContainer');
            
            // Анимация еды
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const food = document.createElement('div');
                    food.className = 'seed';
                    food.textContent = '🐟';
                    food.style.left = '355px';
                    food.style.top = '360px';
                    container.appendChild(food);
                    setTimeout(() => food.remove(), 1000);
                }, i * 200);
            }

            // Сердечки
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart';
                        heart.textContent = '❤️';
                        heart.style.left = (320 + Math.random() * 60) + 'px';
                        heart.style.top = '330px';
                        container.appendChild(heart);
                        setTimeout(() => heart.remove(), 1500);
                    }, i * 200);
                }
            }, 800);

            tasksCompleted.cat = true;
            checkAllTasksCompleted();
        }

        // Анимация кормления шиншиллы
        function animateChinchillaFeed() {
            const container = document.getElementById('gameContainer');
            
            // Семечко
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const seed = document.createElement('div');
                    seed.className = 'seed';
                    seed.textContent = '🌻';
                    seed.style.left = '105px';
                    seed.style.top = '380px';
                    container.appendChild(seed);
                    setTimeout(() => seed.remove(), 1000);
                }, i * 200);
            }

            // Сердечки
            setTimeout(() => {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const heart = document.createElement('div');
                        heart.className = 'heart';
                        heart.textContent = '💕';
                        heart.style.left = (80 + Math.random() * 50) + 'px';
                        heart.style.top = '350px';
                        container.appendChild(heart);
                        setTimeout(() => heart.remove(), 1500);
                    }, i * 200);
                }
            }, 800);

            tasksCompleted.chinchilla = true;
            checkAllTasksCompleted();
        }

        // Проверка выполнения всех заданий
        function checkAllTasksCompleted() {
            if (tasksCompleted.cat && tasksCompleted.chinchilla) {
                setTimeout(() => {
                    fullscreenMessageEl.classList.add('show');
                }, 1500);
            }
        }

        // Управление
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === 'Enter') {
                if (currentDialogue === 'cat' && !tasksCompleted.cat) {
                    animateCatFeed();
                } else if (currentDialogue === 'chinchilla' && !tasksCompleted.chinchilla) {
                    animateChinchillaFeed();
                } else if (fullscreenMessageEl.classList.contains('show')) {
                    // Переход на следующий уровень
                    alert('🎮 Переход на следующий уровень! (Здесь будет переход)');
                    // window.location.href = 'level2.html'; // раскомментируй когда создашь следующий уровень
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Игровой цикл
        function gameLoop() {
            // Очистка
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Движение
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
                player.direction = 'up';
            }
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) {
                player.y += player.speed;
                player.direction = 'down';
            }
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
                player.direction = 'left';
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
                player.direction = 'right';
            }

            // Отрисовка
            drawRoom();
            drawChinchilla(); // Сначала шиншилла (на заднем плане)
            drawCat();        // Потом кошка
            drawPlayer();     // Игрок поверх всего
            updateDialogue();

            requestAnimationFrame(gameLoop);
        }

        // Запуск игры
        gameLoop();
    </script>
</body>
</html>
